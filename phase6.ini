[custom]

; Phase 6 - OpenClash rule config for GL-MT6000
; WannaFlix subscription, Meta core, fake-ip mode
; Updated: 2026-04-10
;
; Design principles:
;   - No ad/hijack/political blocking (AdGuard Home handles filtering)
;   - Free internet, no content REJECT rules
;   - First match wins, most specific groups on top
;   - China combined into one group (media + websites)
;   - Microsoft default DIRECT, manual switch to proxy if needed
;
; Primary rule source: blackmatrix7/ios_rule_script (updated daily, 25k stars)
; Custom: US banks, AI extras, Fei

; =====================================================================
; RULES - priority order (first match wins)
; =====================================================================

; --- 1. LAN / Private - always DIRECT ---
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.list
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Direct/Direct.list

; --- 2. Manual overrides ---
; NAS -> France SS
ruleset=France (SS),[]IP-CIDR,192.168.5.100/32,no-resolve
; France server direct
ruleset=DIRECT,[]IP-CIDR,88.160.50.68/32,no-resolve
; NAS-originated traffic bypass
ruleset=DIRECT,[]SRC-IP-CIDR,192.168.5.100/32

; --- 3. Downloads / Steam - DIRECT ---
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/SteamCN/SteamCN.list
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Download/Download.list

; --- 4. Microsoft - DIRECT default, manual switch to proxy if needed ---
ruleset=Microsoft,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.list

; --- 5. Apple - DIRECT ---
ruleset=Apple,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.list

; --- 6. AI Services - proxy (ACL4SSR unified AI list + custom extras) ---
ruleset=AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
; extras: local additions not guaranteed in upstream lists
ruleset=AI,https://raw.githubusercontent.com/unit117/clashConverter/main/ruleset/ai-extras.list

; --- 7. Meta / Facebook / Instagram / WhatsApp - proxy ---
; blackmatrix7 Facebook includes all Meta properties (570 rules incl IP-ASN)
ruleset=Meta,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Facebook/Facebook.list

; --- 8. Telegram - proxy ---
ruleset=Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list

; --- 9. US Banks - proxy (need US IP, no community list exists) ---
ruleset=US Banks,https://raw.githubusercontent.com/unit117/clashConverter/main/ruleset/us-banks.list

; --- 10. Fei - custom per-user routing ---
ruleset=Fei,https://raw.githubusercontent.com/unit117/clashConverter/main/ruleset/FEI.list

; --- 11. YouTube - proxy ---
ruleset=YouTube,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list

; --- 12. TikTok - proxy ---
ruleset=TikTok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list

; --- 13. Netflix - proxy ---
ruleset=Netflix,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list

; --- 14. Disney+ - proxy ---
ruleset=Disney,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list

; --- 15. BBC iPlayer - UK proxy ---
ruleset=BBC iPlayer,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/BBC/BBC.list

; --- 16. International Media - proxy (broad foreign media catch-all) ---
ruleset=International Media,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GlobalMedia/GlobalMedia.list

; --- 17. Google - proxy ---
ruleset=Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list

; --- 18. China - DIRECT (combined media + domains + IPs + GEOIP) ---
ruleset=China,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMedia/ChinaMedia.list
ruleset=China,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/China/China.list
ruleset=China,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaIPs/ChinaIPs.list
ruleset=China,[]GEOIP,CN

; --- 19. Catch-all proxy (GFW) ---
ruleset=Proxy,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Proxy/Proxy.list

; --- 20. Final fallback ---
ruleset=Final,[]FINAL

; =====================================================================
; PROXY GROUPS
; =====================================================================
; WannaFlix server name filters for region groups

; --- Primary selector ---
custom_proxy_group=Proxy`select`[]Auto`[]HK`[]TW`[]SG`[]JP`[]US`[]UK`[]FR`[]DE`[]Manual`[]DIRECT

; --- Auto test ---
custom_proxy_group=Auto`url-test`(Daily Usage|Recommended)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=Manual`select`.*

; --- Service groups ---
custom_proxy_group=AI`select`[]Auto`[]US`[]UK`[]FR`[]DE`[]SG`[]JP`[]Manual`[]DIRECT
custom_proxy_group=Meta`select`[]Auto`[]US`[]UK`[]SG`[]HK`[]JP`[]FR`[]Manual`[]DIRECT
custom_proxy_group=Telegram`select`[]Proxy`[]Auto`[]SG`[]HK`[]JP`[]US`[]Manual`[]DIRECT
custom_proxy_group=Microsoft`select`[]DIRECT`[]Proxy`[]Auto`[]US`[]HK`[]SG`[]JP`[]Manual
custom_proxy_group=Apple`select`[]DIRECT`[]Proxy`[]Auto`[]US`[]HK`[]SG`[]JP`[]Manual
custom_proxy_group=Google`select`[]Proxy`[]Auto`[]US`[]HK`[]SG`[]JP`[]Manual`[]DIRECT

; --- Streaming ---
custom_proxy_group=YouTube`select`[]Auto`[]US`[]UK`[]SG`[]HK`[]JP`[]Manual`[]DIRECT
custom_proxy_group=TikTok`select`[]Auto`[]US`[]UK`[]SG`[]HK`[]JP`[]Manual`[]DIRECT
custom_proxy_group=Netflix`select`[]Netflix Nodes`[]Auto`[]US`[]UK`[]SG`[]HK`[]JP`[]Manual`[]DIRECT
custom_proxy_group=Disney`select`[]Auto`[]US`[]UK`[]SG`[]HK`[]JP`[]FR`[]DE`[]AU`[]Manual`[]DIRECT
custom_proxy_group=BBC iPlayer`select`[]UK`[]Manual`[]DIRECT
custom_proxy_group=International Media`select`[]Proxy`[]Auto`[]US`[]UK`[]SG`[]HK`[]JP`[]Manual`[]DIRECT

; --- Finance / Custom ---
custom_proxy_group=US Banks`select`[]US`[]Manual`[]DIRECT
custom_proxy_group=Fei`select`[]Auto`[]US`[]UK`[]JP`[]SG`[]HK`[]FR`[]Manual`[]DIRECT
custom_proxy_group=France (SS)`select`(France|TORRENTING)`[]Manual`[]DIRECT

; --- Direct groups ---
custom_proxy_group=China`select`[]DIRECT`[]HK`[]TW`[]SG`[]Manual
custom_proxy_group=Final`select`[]Proxy`[]Auto`[]DIRECT`[]US`[]UK`[]SG`[]HK`[]JP`[]Manual

; --- Region auto-test groups (WannaFlix server names) ---
custom_proxy_group=HK`url-test`(Hong Kong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=JP`url-test`(Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=US`url-test`(US |Los Angeles|New York|STREAMING)`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=TW`url-test`(Taiwan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=SG`url-test`(Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=UK`url-test`(UK)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=FR`url-test`(France|TORRENTING)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=DE`url-test`(Germany)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=KR`url-test`(Korea)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=AU`url-test`(Australia)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=Netflix Nodes`url-test`(NETFLIX|Netflix)`http://www.gstatic.com/generate_204`300,,50

enable_rule_generator=true
overwrite_original_rules=true
